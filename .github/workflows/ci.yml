name: Python CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  # PHASE 1 : Quality Gate (Pre-commit)
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run Pre-commit hooks
        run: uv run pre-commit run --all-files --show-diff-on-failure

  # PHASE 2 : Analyse statique (Mypy & Bandit)
  security-and-types:
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Type Checking (Mypy)
        run: uv run mypy src/

      - name: Security Scan (Bandit)
        run: uv run bandit -r src/ -ll

  # PHASE 3 : Tests unitaires
  tests:
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests with coverage
        run: uv run pytest --cov=src --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
